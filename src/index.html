<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <div class="searchOpt">
        <input type="text" id="searchBar" placeholder="Enter Location">
        <button id="searchBtn">Search</button>
      </div>
      <div id="condition">Condition</div>
      <img id="displayImg">

      <div id="resultDisplay">
        <div id="temp"></div>
        <div id="weatherInfo">
          <div>Details</div>
          <div class="detail">
            <span>Feels Like</span>
            <span id="feelsLike"></span>
          </div>
          <div class="detail">
            <span>Humidity</span>
            <span id="humidity"></span>
          </div>
          <div class="detail">
            <span>Wind</span>
            <span id="wind"></span>
          </div>
          <div class="detail">
            <span>Visibility</span>
            <span id="visibility"></span>
          </div>
        </div>
      </div>

      <div id="day"></div>
      <div id="timePeriod"></div>


    </main>
  </body>
</html>
